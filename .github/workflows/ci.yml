name: Build and Deploy CV

on:
  push:
    branches: [ main ]
    paths:
      - 'tex/*.tex'
      - '.github/workflows/ci.yml'
      - 'generate_cv_previews.py'
      - 'build_cv_website.sh'
  pull_request:
    branches: [ main ]
    paths:
      - 'tex/*.tex'

jobs:
  build:
    runs-on: ubuntu-latest
    container: python:alpine3.22
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y ghostscript python3 python3-pip git
          pip3 install Pillow

      - name: Build CV website (compiles PDFs, generates previews)
        run: |
          echo "Building CV website..."
          chmod +x build_cv_website.sh
          ./build_cv_website.sh

      - name: Upload artifacts
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
