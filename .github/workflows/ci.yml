name: Build and Deploy CV

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ghostscript python3 python3-pip git texlive texlive-latex-extra texlive-fonts-extra texlive-lang-french
          pip3 install Pillow

      - name: Build CV website
        run: |
          chmod +x build_cv_website.sh
          ./build_cv_website.sh

      - name: Upload artifacts
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
