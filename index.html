<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ulysse Boucherie's CV in English and French. Professional profile and resume.">
    <title>Ulysse Boucherie</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://odysseu.github.io/">
    <meta property="og:title" content="Ulysse Boucherie | Download CV">
    <meta property="og:description" content="Download Ulysse Boucherie's CV in English and French. Professional profile and resume.">
    <meta property="og:image" content="https://raw.githubusercontent.com/odysseu/odysseu.github.io/refs/heads/main/circle_profile.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Ulysse Boucherie | CV">
    <meta name="twitter:description" content="Download Ulysse Boucherie's CV in English and French. Professional profile and resume.">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/odysseu/odysseu.github.io/refs/heads/main/circle_profile.png">

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <a href="https://github.com/odysseu" aria-label="GitHub Profile">
            <img src="circle_profile.png" alt="Profile Picture of Ulysse Boucherie" class="profile-picture">
        </a>
        <h1>Download My CV</h1>
        <p class="subtitle">Choose between simple or detailed versions</p>

        <div class="theme-toggle">
            <button onclick="toggleDarkMode()" id="darkModeBtn" aria-label="Toggle dark mode">🌓</button>
        </div>

        <div class="language-tabs">
            <input type="radio" id="french" name="language" value="french" checked onchange="filterByLanguage()">
            <label for="french"><span>🇫🇷 Français</span></label>
            <input type="radio" id="english" name="language" value="english" onchange="filterByLanguage()">
            <label for="english"><span>🇬🇧 English</span></label>
        </div>

        <div class="cv-grid">
            <div class="language-group" data-language="english">
                <div class="cv-grid">
                    <div class="cv-option" onclick="downloadCV('english_simple')">
                        <img src="previews/english_simple_cv_preview.png" alt="Preview of English Simple CV">
                        <p class="version">Simple (1 page)</p>
                    </div>
                    <div class="cv-option" onclick="downloadCV('english_full')">
                        <img src="previews/english_full_cv_preview.png" alt="Preview of English Full CV">
                        <p class="version">Full (Detailed)</p>
                    </div>
                </div>
            </div>

            <div class="language-group" data-language="french">
                <div class="cv-grid">
                    <div class="cv-option" onclick="downloadCV('french_simple')">
                        <img src="previews/french_simple_cv_preview.png" alt="Preview of French Simple CV">
                        <p class="version">Simple (1 page)</p>
                    </div>
                    <div class="cv-option" onclick="downloadCV('french_full')">
                        <img src="previews/french_full_cv_preview.png" alt="Preview of French Full CV">
                        <p class="version">Complète (Détails techniques)</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="note">
            <p>Click on any preview image above to download the corresponding CV version in PDF</p>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
